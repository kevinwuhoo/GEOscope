services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: geo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - cluster.routing.allocation.disk.watermark.low=1gb
      - cluster.routing.allocation.disk.watermark.high=750mb
      - cluster.routing.allocation.disk.watermark.flood_stage=500mb
      - cluster.routing.allocation.disk.watermark.flood_stage.frozen=500mb
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:?set ELASTICSEARCH_PASSWORD}
      - ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - geo_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl --silent --fail --user elastic:$${ELASTIC_PASSWORD}
          http://localhost:9200/_security/_authenticate >/dev/null
          && curl --silent --fail --user elastic:$${ELASTIC_PASSWORD}
          http://localhost:9200/_cluster/health?wait_for_status=yellow&wait_for_no_initializing_shards=true&timeout=5s
          >/dev/null
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  geo_elasticsearch_data:

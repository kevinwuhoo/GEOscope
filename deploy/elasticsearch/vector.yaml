data_dir: /var/lib/vector

sources:
  app_http:
    type: http_server
    address: 0.0.0.0:8686
    path: /events
    strict_path: true
    method: POST
    decoding:
      codec: json
    framing:
      method: newline_delimited

sinks:
  r2:
    type: aws_s3
    inputs: [app_http]
    endpoint: ${R2_ENDPOINT}
    bucket: ${R2_BUCKET}
    region: auto
    force_path_style: true
    key_prefix: "runtime/app=geoscope/year=%Y/month=%m/day=%d/hour=%H/"
    filename_extension: jsonl.gz
    compression: gzip
    encoding:
      codec: json
    batch:
      max_bytes: 134217728
      timeout_secs: ${VECTOR_BATCH_TIMEOUT_SECONDS}
    buffer:
      type: disk
      max_size: 536870912
      when_full: block

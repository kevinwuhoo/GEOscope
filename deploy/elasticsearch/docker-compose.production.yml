services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: geo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.watermark.low=10gb
      - cluster.routing.allocation.disk.watermark.high=5gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
      - cluster.routing.allocation.disk.watermark.flood_stage.frozen=2gb
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:?set ELASTICSEARCH_PASSWORD}
    ports:
      - "127.0.0.1:9200:9200"
      - "10.124.0.2:9200:9200"
    volumes:
      - /srv/elasticsearch/data:/usr/share/elasticsearch/data
      - ./jvm.options.d/heap.options:/usr/share/elasticsearch/config/jvm.options.d/heap.options:ro
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl --silent --fail --user elastic:$${ELASTIC_PASSWORD}
          http://localhost:9200/_security/_authenticate >/dev/null
          && curl --silent --fail --user elastic:$${ELASTIC_PASSWORD}
          http://localhost:9200/_cluster/health?wait_for_status=yellow&wait_for_no_initializing_shards=true&timeout=5s
          >/dev/null
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  vector:
    image: timberio/vector:0.57.0-debian
    container_name: geo-vector
    environment:
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?set R2_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?set R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT:?set R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET:?set R2_BUCKET}
      VECTOR_BATCH_TIMEOUT_SECONDS: "3600"
      VECTOR_DANGEROUSLY_ALLOW_ENV_VAR_INTERPOLATION: "true"
    ports:
      - "10.124.0.2:8686:8686"
    volumes:
      - /srv/vector/data:/var/lib/vector
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    mem_limit: 256m
    cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
